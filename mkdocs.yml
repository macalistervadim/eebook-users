site_name: eebook-users
site_description: Внутренняя документация для разработки eebook-users
site_author: eebook.org
site_url: !ENV [ SITE_URL, "https://eebook-users-bbc525.gitlab.io/" ]

repo_url: https://github.com/eebook-org/eebook-users
repo_name: eebook-org/eebook-users
edit_uri: edit/main/docs/

copyright: >
  Copyright © 2025 — 2026 <a href="https://github.com/eebook-org" target="_blank">eebook.org</a>

theme:
  name: material
  custom_dir: docs/overrides
  language: ru
  logo: assets/eebook-icon_amber@2x.png
  features:
    - navigation.top
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.instant.progress
    - navigation.expand
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

  palette:
    - scheme: default
      primary: orange
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Тёмная тема

    - scheme: slate
      primary: orange
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Светлая тема

  icon:
    repo: fontawesome/brands/github

extra:
  copyright: >
    Последнее обновление: {{ git-revision-date }}
    Автор: {{ git-revision-author }}
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/eebook-org
      name: GitHub
    - icon: material/email
      link: mailto:macalistervadim@ya.ru
      name: Email
  generator: false
  version:
    provider: mike

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.emoji
  - attr_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.tabbed

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: false
      fallback_to_build_date: true
      enable_git_follow: false
      type: date
      locale: ru
      timezone: Europe/Moscow
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
            - src
          options:
            show_source: true
            docstring_style: google
  - mermaid2:
      arguments:
        theme: base
        themeVariables:
          primaryColor: '#f59e0b'
          primaryTextColor: '#ffffff'
          primaryBorderColor: '#ea580c'
          lineColor: '#9a3412'
          secondaryColor: '#fb923c'
          tertiaryColor: '#fff7ed'

nav:
  - Главная: index.md
  - Архитектура:
      - Компоненты: architecture/components.md
  - Руководство:
      - Установка: installation/guide.md
  - API:
      - Python API:
          - Bootstrap: api/python/bootstrap.md
          - Адаптеры:
              - Фабрики: api/python/adapters/factory.md
              - Интерфейсы: api/python/adapters/interfaces.md
              - ORM: api/python/adapters/orm.md
              - Repository: api/python/adapters/repository.md
              - Vault: api/python/adapters/vault_client.md
              - PasswordHasher: api/python/adapters/password_hasher.md
          - Конфигурация:
              - Настройки: api/python/config/settings.md
              - Загрузчик: api/python/config/loader.md
          - Доменная модель: api/python/domain/model.md
          - Сущности:
              - Модели: api/python/schemas/models.md
          - Точки входа:
              - FastAPI приложение: api/python/entrypoints/fastapi_app.md
              - API эндпоинты: api/python/entrypoints/api/endpoints.md
          - Инфраструктура:
              - База данных:
                  - Движок: api/python/infrastructure/database/engine.md
                  - Миграции: api/python/infrastructure/database/migrations.md
              - Жизненный цикл: api/python/infrastructure/lifespan.md
          - Сервисный слой:
              - Зависимости: api/python/service_layer/dependencies.md
              - Unit of Work: api/python/service_layer/uow.md
              - UserService: api/python/service_layer/users_service.md
  - FAQ:
      - Главная: faq/index.md
      - Кодинг и стиль: faq/coding_guidelines.md
      - Git и коммиты: faq/git_commits.md
      - Тестирование: faq/testing.md
      - Контрибьют: faq/contributing.md
  - Troubleshooting:
      - Запуск приложения: troubleshooting/start.md
  - История изменений: changelog.md
  - Лицензия: LICENCE.md
