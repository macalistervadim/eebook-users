name: eebook-users-dev

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '54321:5432'
    volumes:
      - users_pgdata:/var/lib/postgresql/data
    networks:
      - users_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.0-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - users_redis_data:/data
    networks:
      - users_net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '8000:${API_PORT}'
    env_file:
      - .env.dev
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../src:/app/src
      - ../tests:/app/tests
      - ../alembic.ini:/app/alembic.ini:ro
      - ./entrypoints:/app/deployment/entrypoints
      - app_logs:/app/logs
    networks:
      users_net:
      eebook_shared_net:
        aliases:
          - users
    entrypoint: ['sh', '/app/deployment/entrypoints/app.sh']

volumes:
  users_pgdata:
  users_redis_data:
  app_logs:

networks:
  users_net:
    driver: bridge
  eebook_shared_net:
    external: true
